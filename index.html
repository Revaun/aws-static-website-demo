<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AWS Static Website Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      color: #333;
      text-align: center;
      padding: 50px;
      margin: 0;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: rgba(255, 255, 255, 0.85);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2.8em;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      color: #444;
      margin-bottom: 20px;
    }

    .dog-photo {
      width: 100%;
      max-width: 400px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .dog-photo:hover {
      transform: scale(1.05);
    }

    .caption {
      font-style: italic;
      color: #555;
      margin-top: 10px;
    }

    .snowflake {
      position: fixed;
      top: -10px;
      color: white;
      font-size: 1.5em;
      animation: fall 10s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0.8; }
    }

    .snowflake:nth-child(4) { left: 20%; animation-duration: 12s; }
    .snowflake:nth-child(5) { left: 40%; animation-duration: 8s; }
    .snowflake:nth-child(6) { left: 60%; animation-duration: 14s; }
    .snowflake:nth-child(7) { left: 80%; animation-duration: 9s; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AWS Static Website Demo</h1>
    <p>This site is hosted on AWS S3 and tested locally with Docker + LocalStack. It’s versioned with GitHub and styled for professional presentation.</p>

    <!-- Images section -->
    <img src="Images/husky.jpg" alt="My Siberian Husky" class="dog-photo">
    <div class="caption">Meet my Husky — guarding the pipeline from build to deploy.</div>

    <img src="Images/static_website.png" alt="Static Website Demo" class="dog-photo">
    <img src="Images/aws_static_website_demo.png" alt="AWS Demo Screenshot" class="dog-photo">
    <img src="Images/github_actions_badge.png" alt="GitHub Actions Badge" class="dog-photo">
  </div>

  <!-- Snowflakes -->
  <div class="snowflake">❄</div>
  <div class="snowflake">❄</div>
  <div class="snowflake">❄</div>
  <div class="snowflake">❄</div>
  <div class="snowflake">❄</div>
</body>
</html>
